var __SEMANTIC_INVESTIGATION = {"_comment":"Semantic component investigation contract (captain-atlas 17). Fixture-backed for this slice: the data shape is producer-compatible (a future producer overwrites this file with real output). Every claim carries a source_boundary and a resolvable source_ref. The Spark\u003c->Flink overlap is declared on BOTH components. Component ids match docs/site/atlas/system-map.demo.json. Swap this sample for another eligible set by editing only this fixture + sources.json — the contract, validator, shell, and harness are data-driven.","target":{"id":"apache-bigtop","display_name":"Apache Bigtop"},"capabilities":[{"id":"capability:search-index","label":"Search & indexing"},{"id":"capability:processing","label":"Distributed processing"},{"id":"capability:streaming","label":"Stream processing"},{"id":"capability:coordination","label":"Workflow scheduling & coordination"},{"id":"capability:storage-foundation","label":"Storage & compute foundation"},{"id":"capability:packaging","label":"Packaging & integration"}],"regions":[{"id":"capability:search-region","label":"Search region","description":"Components that index and query documents over large corpora.","capabilities":["capability:search-index"]},{"id":"capability:compute-region","label":"Compute & streaming region","description":"Components that move and transform data across a cluster. Overlap lives here: Spark and Flink both process big data but with different streaming models.","capabilities":["capability:processing","capability:streaming"]},{"id":"capability:orchestration-region","label":"Orchestration region","description":"Components that schedule and coordinate work, including retired/legacy schedulers with an honest source boundary.","capabilities":["capability:coordination"]},{"id":"capability:platform-region","label":"Platform foundation region","description":"The Hadoop filesystem/YARN foundation the other regions build on.","capabilities":["capability:storage-foundation","capability:packaging"]}],"sources_ref":"sources.json","sample":{"selection_reason":"Four components prove the portable contract without encoding product facts around fixed names: Solr (a component with a clear search/indexing capability and a rich internal model), Spark and Flink (a meaningful semantic overlap pair in the compute/streaming region, bidirectionally related across 3+ dimensions), and Oozie (a retired, metadata-only component that forces an honest not_assessed/curated source boundary). The selection exercises every required relation type and source boundary; swapping it for another eligible set requires editing only this fixture and the source cards.","components":["component:apache-solr","component:apache-spark","component:apache-flink","component:apache-oozie"]},"components":[{"id":"component:apache-solr","display_name":"Apache Solr","ecosystem_regions":["capability:search-region"],"purpose":{"summary":"Solr is the ecosystem's search and indexing server: it ingests documents into an inverted index and answers term, boolean, and ranked queries at scale. In Bigtop it is the search capability, packaged as a versioned component and wired into the smoke-test and deployment surface.","source_boundary":"curated-knowledge","source_ref":"source:solr-curated-architecture"},"capabilities":[{"id":"capability:search-index","label":"Search & indexing","source_boundary":"curated-knowledge","source_ref":"source:solr-refguide"},{"id":"capability:packaging","label":"Packaging & integration (via Bigtop recipe)","source_boundary":"local-corpus","source_ref":"evidence:solr-bigtop-recipe"}],"internal_concepts":[{"id":"concept:solr-inverted-index","label":"Inverted index","explanation":"Documents are tokenized into an inverted index (term to postings). This is what makes term and boolean queries fast; schema/analyser choices directly affect recall and ranking.","source_boundary":"local-corpus","source_ref":"receipt:rc:rg-solr-index"},{"id":"concept:solr-schema","label":"Managed schema","explanation":"Field definitions, analysers, and tokenisers declared in a schema. The schema decides how text is split and matched; a wrong analyser is a query-quality bug, not a code bug.","source_boundary":"curated-knowledge","source_ref":"source:solr-curated-architecture"},{"id":"concept:solr-query","label":"Query / parser","explanation":"Queries are parsed (standard or eDisMax) against the schema. Relevance functions (BM25) and boosts live here, separate from the index.","source_boundary":"curated-knowledge","source_ref":"source:solr-refguide"},{"id":"concept:solr-shard","label":"Shard","explanation":"A collection is split into shards, each a horizontal slice of the index, sharded by document hash. The shard count is fixed at collection creation and expensive to change.","source_boundary":"curated-knowledge","source_ref":"source:solr-curated-architecture"},{"id":"concept:solr-replica","label":"Replica & SolrCloud coordination","explanation":"Each shard has replicas (leaders/followers). SolrCloud uses ZooKeeper and an Overseer node to elect leaders and route updates, so coordination is an operational concern, not just an index concern.","source_boundary":"curated-knowledge","source_ref":"source:solr-curated-architecture"}],"integration_surfaces":[{"kind":"package_recipe","label":"Bigtop Solr packaging recipe","source_boundary":"local-corpus","evidence_ref":"evidence:solr-bigtop-recipe","explanation":"Bigtop packages Solr as a versioned component (bigtop-packages/ Solr recipe); the version is pinned in the BOM."},{"kind":"api","label":"Solr HTTP query API","source_boundary":"curated-knowledge","evidence_ref":"source:solr-refguide","explanation":"Solr exposes an HTTP request API for queries and updates; clients integrate over HTTP."},{"kind":"deployment","label":"SolrCloud deployment topology","source_boundary":"agent-hypothesis","evidence_ref":"risk:solr-deploy-topology","explanation":"A SolrCloud deployment needs ZooKeeper ensembles and shard/replica planning; the exact deployed topology in this target is not verified from the static corpus."}],"semantic_relations":[{"type":"depends_on","target_id":"component:apache-zookeeper","dimensions":["capability:coordination"],"explanation":"SolrCloud depends on ZooKeeper for cluster coordination and leader election.","source_boundary":"curated-knowledge","source_ref":"source:solr-curated-architecture"},{"type":"integrates_with","target_id":"component:apache-hadoop","dimensions":["capability:storage-foundation"],"explanation":"Solr can store its index on HDFS and integrates with the Hadoop filesystem layer.","source_boundary":"agent-hypothesis","source_ref":"risk:solr-hdfs-integration"},{"type":"packaged_by_target","target_id":"component:apache-bigtop-repo","dimensions":["capability:packaging"],"explanation":"Bigtop packages Solr into the distribution as a versioned, smoke-tested component.","source_boundary":"local-corpus","source_ref":"evidence:solr-bigtop-recipe"}],"risks":[{"id":"risk:solr-shard-count","label":"Shard count is expensive to change","explanation":"The number of shards is fixed at collection creation. Underestimating it forces a costly reindex/re-split as data grows, which is a capacity-planning trap specific to Solr.","source_boundary":"curated-knowledge","source_ref":"source:solr-curated-architecture"},{"id":"risk:solr-deploy-topology","label":"Deployed topology not statically verifiable","explanation":"The exact SolrCloud topology (shard/replica placement, ZooKeeper ensemble) cannot be confirmed from packaging manifests alone; a runtime/deploy probe is needed. Treating the recipe as the topology would be a false-completeness bug.","source_boundary":"agent-hypothesis","source_ref":"risk:solr-deploy-topology"},{"id":"risk:solr-hdfs-integration","label":"HDFS-backed index performance assumption","explanation":"Storing the index on HDFS trades local-disk latency for cluster storage; assuming HDFS-backed indexing performs like local storage is a component-specific operational risk.","source_boundary":"agent-hypothesis","source_ref":"risk:solr-hdfs-integration"}],"evidence_boundary":{"local_corpus":["evidence:solr-bigtop-recipe"],"curated_knowledge":["source:solr-refguide","source:solr-curated-architecture"],"agent_hypotheses":["risk:solr-deploy-topology","risk:solr-hdfs-integration"],"not_assessed":["gap:solr-runtime-topology","gap:solr-query-benchmarks","gap:solr-recipe-source-anchor"]},"next_expedition":[{"producer":"runtime/deploy probe","action":"Capture the actual SolrCloud topology (shards/replicas/ZooKeeper ensemble) from a running instance in an approved sandbox.","why":"Turns the agent-hypothesis deploy-topology risk into local-corpus/runtime evidence.","closes_gap":"gap:solr-runtime-topology"},{"producer":"source-anchored producer","action":"Pin the exact Bigtop Solr recipe version and any applied patches by scanning bigtop-packages/src/solr/.","why":"Confirms the packaging integration surface at source level.","closes_gap":"gap:solr-recipe-source-anchor"}]},{"id":"component:apache-spark","display_name":"Apache Spark","ecosystem_regions":["capability:compute-region"],"purpose":{"summary":"Spark is a distributed data-processing engine for batch and micro-batch workloads over large datasets. In Bigtop it is the primary compute engine in the compute/streaming region, used for ETL, analytics, and structured streaming.","source_boundary":"curated-knowledge","source_ref":"source:spark-curated-model"},"capabilities":[{"id":"capability:processing","label":"Distributed processing","source_boundary":"curated-knowledge","source_ref":"source:spark-docs"},{"id":"capability:streaming","label":"Micro-batch streaming (Structured Streaming)","source_boundary":"curated-knowledge","source_ref":"source:spark-docs"}],"internal_concepts":[{"id":"concept:spark-rdd","label":"RDD","explanation":"The Resilient Distributed Dataset: a fault-tolerant, partitioned, lazily-evaluated collection. The original low-level API and the lineage basis for recovery.","source_boundary":"local-corpus","source_ref":"receipt:rc:rg-spark-streaming"},{"id":"concept:spark-dataframe","label":"DataFrame / Dataset","explanation":"The higher-level tabular API with a schema, over RDDs. Most production code uses DataFrames because the optimizer can reason about them.","source_boundary":"curated-knowledge","source_ref":"source:spark-curated-model"},{"id":"concept:spark-catalyst","label":"Catalyst optimizer","explanation":"Turns DataFrame operations into an optimized physical plan. It is why logically-equivalent pipelines can have very different performance.","source_boundary":"curated-knowledge","source_ref":"source:spark-docs"},{"id":"concept:spark-dag-scheduler","label":"DAG scheduler","explanation":"Breaks a job into stages of tasks along shuffle boundaries and submits them. Stage count and shuffle volume dominate job performance.","source_boundary":"curated-knowledge","source_ref":"source:spark-curated-model"},{"id":"concept:spark-executor","label":"Executor","explanation":"A JVM process on a worker that runs tasks and holds cached data. Memory pressure (cache vs shuffle vs user objects) is the most common operational failure.","source_boundary":"curated-knowledge","source_ref":"source:spark-curated-model"}],"integration_surfaces":[{"kind":"package_recipe","label":"Bigtop Spark packaging recipe","source_boundary":"local-corpus","evidence_ref":"evidence:bigtop-bom","explanation":"Bigtop packages Spark as a versioned component; the version is pinned in the BOM and the support matrix."},{"kind":"api","label":"Spark session / DataFrame API","source_boundary":"curated-knowledge","evidence_ref":"source:spark-docs","explanation":"Spark is driven through a SparkSession building DataFrames; this is the integration surface application code targets."},{"kind":"deployment","label":"YARN / cluster deployment","source_boundary":"local-corpus","evidence_ref":"evidence:hadoop-corpus","explanation":"Spark runs on YARN (Hadoop) as the cluster manager in this ecosystem; the depends_on Hadoop relation reflects this."}],"semantic_relations":[{"type":"depends_on","target_id":"component:apache-hadoop","dimensions":["capability:storage-foundation"],"explanation":"Spark runs against Hadoop's filesystem and typically uses YARN as its cluster manager.","source_boundary":"local-corpus","source_ref":"evidence:hadoop-corpus"},{"type":"overlaps_with","target_id":"component:apache-flink","dimensions":["capability:processing","capability:streaming","capability:packaging"],"explanation":"Spark and Flink are both distributed compute engines over partitioned data in the same compute/streaming region, both depend on Hadoop, and both are packaged by Bigtop. They overlap in problem space, ecosystem placement, and API surface.","source_boundary":"curated-knowledge","source_ref":"source:spark-flink-overlap"},{"type":"contrasts_with","target_id":"component:apache-flink","dimensions":["capability:streaming"],"explanation":"Spark uses micro-batch streaming (throughput/simple), Flink is a true streaming engine (low latency, stateful exactly-once). This is the decisive axis that justifies the ecosystem containing both.","source_boundary":"curated-knowledge","source_ref":"source:spark-flink-overlap"}],"risks":[{"id":"risk:spark-executor-memory","label":"Executor memory pressure","explanation":"Spark executors share memory across caching, shuffling, and user objects. Memory mis-sizing causes spilling and OOMs that look like data bugs — a component-specific failure mode.","source_boundary":"curated-knowledge","source_ref":"source:spark-curated-model"},{"id":"risk:spark-shuffle-skew","label":"Shuffle skew dominates performance","explanation":"Because the DAG scheduler plans stages around shuffle boundaries, a skewed key distribution silently makes a job run far longer than its data size suggests. This is a Spark-specific tuning trap.","source_boundary":"agent-hypothesis","source_ref":"risk:spark-shuffle-skew"}],"evidence_boundary anation":"Fault tolerance via distributed snapshots (checkpoint barriers flowing through the stream). This is the basis of Flink's exactly-once guarantee.","source_boundary":"curated-knowledge","source_ref":"source:flink-docs"},{"id":"concept:flink-state-backend","label":"State backend","explanation":"Operator state (keyed/operator) is stored in a state backend (e.g. RocksDB). Stateful streaming correctness depends on how state is keyed, checkpointed, and restored.","source_boundary":"curated-knowledge","source_ref":"source:flink-curated-model"},{"id":"concept:flink-windowing","label":"Windowing","explanation":"Window operators group unbounded streams into finite windows (tumbling/sliding/session) over event/processing time. Window + watermark semantics are where most correctness bugs live.","source_boundary":"curated-knowledge","source_ref":"source:flink-curated-model"}],"integration_surfaces":[{"kind":"package_recipe","label":"Bigtop Flink packaging recipe","source_boundary":"local-corpus","evidence_ref":"evidence:bigtop-bom","explanation":"Bigtop packages Flink as a versioned component; the version is pinned in the BOM."},{"kind":"api","label":"DataStream / Table API","source_boundary":"curated-knowledge","evidence_ref":"source:flink-docs","explanation":"Flink is driven through the DataStream and Table APIs; this is the integration surface for streaming applications."},{"kind":"deployment","label":"JobManager/TaskManager deployment","source_boundary":"agent-hypothesis","evidence_ref":"risk:flink-deploy-topology","explanation":"A Flink deployment needs JobManager/TaskManager sizing and a state backend choice; the exact deployed topology is not verified from the static corpus."}],"semantic_relations":[{"type":"depends_on","target_id":"component:apache-hadoop","dimensions":["capability:storage-foundation"],"explanation":"Flink can use Hadoop's filesystem for state checkpoints and YARN as a cluster manager.","source_boundary":"local-corpus","source_ref":"evidence:had     for (const fn of listeners) fn(frag);

  function bind() {
    if (bound || typeof window === 'undefined') return;
    bound = true;
    window.addEventListener('hashchange', emit);

    current() { return currentFragment(); },
    route(fragment) {

      listeners.add(handler);
      return () => listeners.delete(handler);
    },
  };
}

function(module, exports, require){/**
 * Adapter: SVG graph renderer.
 *
 * Implements the GraphRenderer port for SVG (Part 1). Renders the graph model
 * (nodes/edges/bounds from open-behaviour-map) into an <svg> and emits abstract
 * events (node-click, node-hover, edge-click) that use-case logic listens to.
 * The WebGL renderer (Part 2) will implement the same port via ray-picking.
 *
 * Receives an injectable `document` (defaults to the global) so it is testable
 * without a real DOM. This is the ONLY adapter that touches SVG/DOM events.
 *
 * Adapters layer — may depend on ports.
 */
'use strict';

const SVG_NS = 'http://www.w3.org/2000/svg';

function createSvgGraphRenderer(container, opts = {}) {
  const doc = opts.document || (typeof document !== 'undefined' ? document : null);
  if (!doc) throw new Error('svg-graph-renderer requires a document (inject for tests)');
  const eventHandlers = new Set();
  let svg = null;
  let nodeIndex = new Map(); // id -> { group, data }
  let edgeIndex = new Map(); // id -> { line, data }
  let alive = true;

  function emit(event) { for (const fn of eventHandlers) fn(event); }
  function svgEl(tag, attrs, children) {
    const node = doc.createElementNS(SVG_NS, tag);
    const a = attrs || {};
    for (const [k, v] of Object.entries(a)) {
      if (v == null || v === false) continue;
      node.setAttribute(k, v);
    }
    for (const child of (children || [])) {
      if (child == null) continue;
      node.appendChild(typeof child === 'string' ? doc.createTextNode(child) : child);
    }
    return node;
  }

  function render(model, theme) {
    // Clear previous render.
    if (svg && svg.parentNode === container) container.removeChild(svg);
    nodeIndex = new Map();
    edgeIndex = new Map();
    const b = model.bounds;
    svg = svgEl('svg', {
      class: 'graph-svg',
      viewBox: `${b.minX} ${b.minY} ${b.width} ${b.height}`,
      preserveAspectRatio: 'xMidYMid meet',
      role: 'img',
      'aria-label': 'Component dependency graph',
    });

    // defs: arrow marker + glow filter.
    const defs = svgEl('defs');
    defs.appendChild(svgEl('marker', {
      id: 'graph-arrow', viewBox: '0 0 10 10', refX: '9', refY: '5',
      markerWidth: '6', markerHeight: '6', orient: 'auto-start-reverse',
    }, [svgEl('path', { d: 'M0,0 L10,5 L0,10 z', fill: 'rgba(168,181,255,0.55)' })]));
    if (theme.graph.haloMode === 'glow') {
      const glow = svgEl('filter', { id: 'graph-glow', x: '-50%', y: '-50%', width: '200%', height: '200%' });
      glow.appendChild(svgEl('feGaussianBlur', { stdDeviation: '4', result: 'blur' }));
      glow.appendChild(svgEl('feMerge', null, [svgEl('feMergeNode', { in: 'blur' }), svgEl('feMergeNode', { in: 'SourceGraphic' })]));
      defs.appendChild(glow);
    }
    svg.appendChild(defs);

    // Edges first (under nodes).
    const edgeLayer = svgEl('g', { class: 'edge-layer' });
    for (const e of model.edges) {
      const line = svgEl('line', {
        class: e.structural ? 'graph-edge graph-edge--structural' : 'graph-edge graph-edge--dependency',
        x1: e.x1, y1: e.y1, x2: e.x2, y2: e.y2,
        'data-portolan-id': e.id,
        'data-portolan-kind': 'relationship',
        'data-portolan-route': e.route,
        'data-portolan-clickable': 'true',
        'data-relationship-type': e.relationshipType || '',
        'data-from': e.fromId, 'data-to': e.toId,
        'marker-end': 'url(#graph-arrow)',
      });
      line.addEventListener('click', (ev) => { ev.preventDefault(); emit({ type: 'edge-click', id: e.id }); });
      edgeLayer.appendChild(line);
      edgeIndex.set(e.id, { line, data: e });
    }
    svg.appendChild(edgeLayer);

    // Nodes.
    const nodeLayer = svgEl('g', { class: 'node-layer' });
    for (const n of model.nodes) {
      const col = (theme.families[n.family] || theme.families.unknown) || { main: '#888', glow: '#aaa', ink: '#444', soft: '136,136,136' };
      let ringDash = 'none', ringStroke = col.main;
      if (n.lifecycle === 'retired') { ringDash = '4 3'; ringStroke = col.glow; }
      const g = svgEl('g', {
        class: 'graph-node',
        transform: `translate(${n.x},${n.y})`,
        'data-portolan-id': n.id,
        'data-portolan-kind': 'component',
        'data-portolan-route': n.route,
        'data-portolan-clickable': 'true',
        'data-family': n.family,
      });
      g.appendChild(svgEl('circle', {
        class: 'node-halo', r: String(n.r + 6),
        fill: `rgba(${col.soft},0.10)`,
      }));
      g.appendChild(svgEl('circle', {
        class: 'node-ring', r: String(n.r + 2), fill: 'none',
        stroke: ringStroke, 'stroke-width': '1.5', 'stroke-dasharray': ringDash,
        opacity: n.lifecycle === 'unknown' ? '0.5' : '0.8',
      }));
      const coreAttrs = { class: 'node-core', r: String(n.r), fill: col.main, stroke: col.glow, 'stroke-width': '1.5' };
      if (theme.graph.haloMode === 'glow') coreAttrs.filter = 'url(#graph-glow)';
      g.appendChild(svgEl('circle', coreAttrs));
      g.appendChild(svgEl('text', { class: 'node-label', y: String(n.r + 16), 'text-anchor': 'middle' }, [n.label]));
      g.addEventListener('click', (ev) => { ev.preventDefault(); emit({ type: 'node-click', id: n.id }); });
      g.addEventListener('mouseenter', () => { emit({ type: 'node-hover', id: n.id }); });
      g.addEventListener('mouseleave', () => { emit({ type: 'node-hover', id: null }); });
      nodeLayer.appendChild(g);
      nodeIndex.set(n.id, { group: g, data: n });
    }
    svg.appendChild(nodeLayer);
    container.appendChild(svg);
  }

  function focusNode(id) {
    if (!svg) return;
    if (id == null) {
      svg.querySelectorAll('.is-dim,.is-active').forEach(e => { e.classList.remove('is-dim'); e.classList.remove('is-active'); });
      return;
    }
    const connected = new Set([id]);
    svg.querySelectorAll('.graph-edge').forEach(e => {
      const from = e.getAttribute('data-from'), to = e.getAttribute('data-to');
      if (from === id || to === id) { e.classList.add('is-active'); connected.add(from); connected.add(to); }
      else e.classList.add('is-dim');
    });
    svg.querySelectorAll('.graph-node').forEach(n => {
      if (connected.has(n.getAttribute('data-portolan-id'))) n.classList.remove('is-dim');
      else n.classList.add('is-dim');
    });
  }

  function onEvent(handler) {
    eventHandlers.add(handler);
    return () => eventHandlers.delete(handler);
  }

  function destroy() {
    alive = false;
    eventHandlers.clear();
    nodeIndex.clear();
    edgeIndex.clear();
    if (svg && svg.parentNode === container) container.removeChild(svg);
    svg = null;
  }

  return { render, focusNode, onEvent, destroy };
}

module.exports = { createSvgGraphRenderer };

    'traversal.',

// Materials declaration" instead of "bom". Sourced from the doc-13 vocabulary;
// unknown roles fall back honestly.
const PATH_ROLE_LABELS = {
  entrypoint: 'Entry point',
  command_dispatch: 'Command dispatch',
  workflow_script: 'Workflow script',
  bundle_builder: 'Bundle / export builder',
  schema: 'Schema',
  validator: 'Validator',
  viewer_api: 'Viewer API surface',
  source_snippet_boundary: 'Source-preview security boundary',
  bom: 'Bill of Materials declaration',
  package_recipe: 'Package recipe',
  package_spec: 'Package specification',
  install_script: 'Install script',
  deploy_module: 'Deployment module',
  provisioner: 'Provisioner (Puppet / Docker)',
  smoke_test: 'Smoke / interoperability test',
  runtime_layout: 'Runtime layout',
  upstream_source: 'Upstream source',
  docs: 'Documentation',
  patch: 'Patch',
  fixture: 'Fixture',
  generated: 'Generated artifact',
  unknown: 'Unknown role',
};

// Evidence-state -> plain-language rendering (source visibility, not runtime
// proof). Used so the dossier never implies runtime verification.
const EVIDENCE_STATE_LABELS = {

  'metadata-visible': 'Metadata-visible',
  'runtime-visible': 'Runtime-visible',
  'claim-only': 'Claim only (no source seen)',

  cannot_verify: 'Cannot verify',
  not_assessed: 'Not assessed',
  blocked: 'Blocked',
  failed: 'Failed',

// ---------------------------------------------------------------------------
// Journeys
// ---------------------------------------------------------------------------

/**
 * Build the system-journey list for a parsed nav-atlas.
 *
 * Emits, in priority order:
 *  - one journey per known ROUTE_JOURNEYS entry whose route_id is present;
 *  - a synthesized "Build And Smoke Confidence Boundary" journey when there are
 *    not_assessed/blocked runtime stages (the "where does confidence stop"
 *    journey the spec requires);
 *  - a synthesized "Repository Fleet Coverage" journey summarizing coverage
 *    scale (covered vs route-less subjects).
 *
 * Each journey object carries enough derived fact for the card to answer the
 * six required questions (what/why/involved/known/not-assessed/next) WITHOUT the
 * shell re-reading raw artifacts.
 *
 * @param {object} navAtlas parsed artifact set
 * @returns {Array<object>} journeys sorted by readingPriority
 */
function buildJourneys(navAtlas) {
  const ni = (navAtlas && navAtlas.navigationIndex) || [];
  const cm = (navAtlas && navAtlas.coverageMatrix) || [];
  const fi = (navAtlas && navAtlas.findings) || [];
  const up = (navAtlas && navAtlas.unknownProbes) || [];

  const routesById = indexRoutes(ni);
  const findingsById = new Map(fi.map(f => [f.finding_id, f]));
  const probesById = new Map(up.map(p => [p.unknown_id, p]));
  const out = [];

  for (const [routeId, meta] of Object.entries(ROUTE_JOURNEYS)) {
    const route = routesById.get(routeId);
    if (!route) continue; // never advertise a journey the bundle cannot back
    out.push(buildRouteJourney(route, meta, findingsById, probesById));
  }

  // Confidence-boundary journey (required by doc 15): surfaces every
  // not_assessed/blocked runtime stage as "this is where confidence stops".
  const confJourney = buildConfidenceBoundaryJourney(ni, up);
  if (confJourney) out.push(confJourney);

  // Fleet-coverage journey (required by doc 15): the "this is a fleet, not one
  // route" view, derived from the coverage matrix.
  const covJourney = buildFleetCoverageJourney(cm);
  if (covJourney) out.push(covJourney);

  out.sort((a, b) => (a.readingPriority || 99) - (b.readingPriority || 99));
  return out;
}

function indexRoutes(ni) {
  const map = new Map();
  for (const s of ni) {
    if (!map.has(s.route_id)) {
      map.set(s.route_id, {
        route_id: s.route_id,
        route_family: s.route_family,
        route_title: s.route_title,
        route_quality: s.route_quality,
        route_quality_note: s.route_quality_note || '',
        next_raw_check: '',
        stages: [],
        findingIds: new Set(),
        probeIds: new Set(),
        evidenceIds: new Set(),
        subjects: new Set(),
        sourceStates: new Set(),
        runtimeAssessments: new Set(),
      });
    }
    const r = map.get(s.route_id);
    r.stages.push(s);
    for (const f of s.finding_refs || []) r.findingIds.add(f);
    for (const p of s.unknown_probe_refs || []) r.probeIds.add(p);
    for (const e of s.evidence_refs || []) r.evidenceIds.add(e);
    if (s.subject_id) r.subjects.add(s.subject_id);
    if (s.source_evidence_state) r.sourceStates.add(s.source_evidence_state);
    if (s.runtime_assessment) r.runtimeAssessments.add(s.runtime_assessment);
    if (s.next_raw_check) r.next_raw_check = s.next_raw_check;
  }
  for (const r of map.values()) {
    r.stages.sort((a, b) => a.stage_index - b.stage_index);
    // route_quality is cumulatively degraded across stages; the last stage
    // carries the final value (matches nav-atlas-viewmodel + open-navigation-route).
    if (r.stages.length) {
      r.route_quality = r.stages[r.stages.length - 1].route_quality;
      r.route_quality_note = r.stages[r.stages.length - 1].route_quality_note || '';
    }
  }
  return map;
}

function buildRouteJourney(route, meta, findingsById, probesById) {
  const notAssessedRuntime = route.runtimeAssessments.has('not_assessed') || route.runtimeAssessments.has('blocked');
  const knownBits = [...route.sourceStates].sort().map(s => EVIDENCE_STATE_LABELS[s] || s);
  const findingRows = [...route.findingIds].map(id => findingsById.get(id)).filter(Boolean);
  const probeRows = [...route.probeIds].map(id => probesById.get(id)).filter(Boolean);

  // "Next expedition" for this journey: prefer the route's own next_raw_check,
  // fall back to the first probe's next_probe, then to the journey's
  // whereConfidenceStops note. Never empty.
  let nextStep = route.next_raw_check;
  if (!nextStep && probeRows.length) nextStep = probeRows[0].next_probe;
  if (!nextStep) nextStep = meta.whereConfidenceStops;

  return {
    journeyId: meta.journeyId,
    kind: 'route',
    routeId: route.route_id,
    title: meta.title,
    journeySummary: meta.journeySummary,
    whyItMatters: meta.whyItMatters,
    whereConfidenceStops: meta.whereConfidenceStops,
    known: knownBits.length ? knownBits.join(', ') : 'No source-visible stages recorded.',
    notAssessed: notAssessedRuntime
      ? 'Runtime/build/test stages are blocked or not assessed — do not read source visibility as a working system.'
      : 'No blocked runtime stages recorded for this journey.',
    involvedSubjects: [...route.subjects],
    involvedStageCount: route.stages.length,
    findingIds: [...route.findingIds],
    probeIds: [...route.probeIds],
    topFindingTitles: findingRows.slice(0, 2).map(f => f.title),
    topProbeSurfaces: probeRows.slice(0, 3).map(p => p.blocked_surface),
    nextStep,
    readingPriority: meta.readingPriority || 50,
    // honest label: this narrative is fixture/profile-authored, generated from
    // the artifact set, not hand-written into HTML and not claimed as live
    // extraction.
    provenance: 'fixture_backed',
  };
}

function buildConfidenceBoundaryJourney(ni, up) {
  // Collect runtime-not-assessed/blocked stages across all routes.
  const stopStages = ni.filter(s => s.runtime_assessment === 'not_assessed' || s.runtime_assessment === 'blocked');
  if (!stopStages.length) return null;
  const probesById = new Map(up.map(p => [p.unknown_id, p]));
  const probeIds = new Set();
  const routeIds = new Set();
  for (const s of stopStages) {
    for (const p of s.unknown_probe_refs || []) probeIds.add(p);
    routeIds.add(s.route_id);
  }
  const probeRows = [...probeIds].map(id => probesById.get(id)).filter(Boolean);
  return {
    journeyId: 'journey:confidence-boundary',
    kind: 'confidence_boundary',
    routeId: null,
    title: 'Build And Smoke Confidence Boundary',
    journeySummary:
      'Across every mapped route, Portolan can see the static source chain but cannot confirm ' +
      'that anything builds, provisions, passes smoke, or runs. This journey collects every ' +
      'stage where confidence stops, so the boundary is visible in one place rather than ' +
      'scattered across dossiers.',
    whyItMatters:
      'Source-visible is not verified. If you treat the atlas as proof the system works, you ' +
      'are reading past the boundary this journey draws.',
    whereConfidenceStops:
      'Every runtime/build/test stage here is blocked or not assessed. No probe ran in this ' +
      'expedition, so none of these stages can be called verified.',
    known: stopStages.length + ' stage(s) are source-visible or metadata-visible but runtime-unverified.',
    notAssessed:

      'assessed. This cannot be called verified without running probes.',
    involvedSubjects: [...new Set(stopStages.map(s => s.subject_id).filter(Boolean))],
    involvedStageCount: stopStages.length,
    findingIds: [],
    probeIds: [...probeIds],
    topFindingTitles: [],
    topProbeSurfaces: probeRows.slice(0, 4).map(p => p.blocked_surface),
    nextStep: probeRows.length

function buildFleetCoverageJourney(cm) {

    title: 'Repository Fleet Coverage',
    journeySummary:

      'route, which are only partially mapped, and which sit outside any route at all.',
    whyItMatters:
      'A route-rich subject is understood; a route-less subject is a known unknown. The fleet ' +
      'view keeps the unmapped majority from being hidden by the one mapped route.',
    whereConfidenceStops:
      'Coverage records representation, not runtime proof. A "covered" subject has a route; it ' +
      'does not have a verified build or runtime.',
    known:

    involvedSubjects: [],
    involvedStageCount: 0,
    findingIds: [],
    probeIds: [],
    topFindingTitles: [],
    topProbeSurfaces: [],

    readingPriority: 20,
    provenance: 'fixture_backed',
  };

// ---------------------------------------------------------------------------
// Route diagrams + thesis + stage role + anchor status
// ---------------------------------------------------------------------------

/**
 * Build a linear route diagram (ordered stages -> nodes, sequential flow -> edges)
 * from a route's stages. No graph library; the shell renders nodes/edges as a
 * wrapped flex flow with arrows. Each node carries role/evidence/runtime/finding
 * /probe signals so the diagram is legible without a table.
 *
 * @param {Array<object>} stages ordered navigation-index stage rows for one route
 * @returns {{nodes:Array, edges:Array}}
 */
function buildRouteDiagram(stages) {
  const sorted = [...stages].sort((a, b) => a.stage_index - b.stage_index);
  const nodes = sorted.map(s => ({
    stageIndex: s.stage_index,
    label: stageLabel(s),
    role: PATH_ROLE_LABELS[s.path_role] || s.path_role || 'Stage',
    roleKey: s.path_role || 'unknown',
    evidenceState: EVIDENCE_STATE_LABELS[s.source_evidence_state] || s.source_evidence_state || 'Not assessed',
    runtimeAssessment: s.runtime_assessment || 'not_assessed',
    findingCount: (s.finding_refs || []).length,
    probeCount: (s.unknown_probe_refs || []).length,
    anchorStatus: anchorStatus(s),
  }));
  const edges = [];
  for (let i = 0; i < nodes.length - 1; i++) edges.push({ from: nodes[i].stageIndex, to: nodes[i + 1].stageIndex });
  return { nodes, edges };
}

/**
 * Human-readable stage label: prefer the stage's own name prettified, fall back
 * to its role label. Never just the raw snake_case id.
 */
function stageLabel(s) {
  if (s && s.stage && /^[a-z0-9_-]+$/.test(s.stage)) {
    return s.stage
      .split(/[-_]/)
      .filter(Boolean)
      .map(w => w.charAt(0).toUpperCase() + w.slice(1))
      .join(' ');
  }
  return (s && s.stage) || PATH_ROLE_LABELS[(s && s.path_role)] || 'Stage';
}

/**
 * Resolve the reading thesis for a route (what this route explains). Uses
 * profile-authored copy when available; otherwise synthesizes an honest,
 * generic-but-meaningful line from the route family + stage roles (NOT a bare
 * field restatement).
 */
function routeThesis(route, stages) {
  if (route && ROUTE_THESES[route.route_id]) return ROUTE_THESES[route.route_id];
  const roles = [...new Set((stages || []).map(s => PATH_ROLE_LABELS[s.path_role] || s.path_role).filter(Boolean))];
  if (roles.length) {
    return 'This route traces a ' + roles.join(' -> ') + ' path through the system. Each stage is ' +
      'source-visible where anchored; runtime/build/test confidence is recorded per stage.';
  }
  return 'This route traces an ordered system path. Open the diagram to see its stages and where confidence stops.';
}

/**
 * Classify a stage's anchor quality for honest rendering.
 *
 * Priority:
 *  1. If the row carries an export-time-enriched `anchor_status`, trust it
 *     (adapter resolved the file precisely).
 *  2. `line_start > 0` -> 'precise' (a real line anchor exists).
 *  3. `line_start === 0` + a quality note mentioning ambiguity -> 'ambiguous'.
 *  4. `line_start === 0` + a quality note mentioning a missing anchor -> 'missing'.
 *  5. Otherwise 'unresolved' (we simply cannot tell).
 *
 * This NEVER fabricates a precise anchor: a 0/0 line range is never rendered as
 * a precise line number, even if source_excerpt somehow appears.
 */
function anchorStatus(stage) {
  if (stage && stage.anchor_status) return stage.anchor_status;
  const ls = Number(stage && stage.line_start);
  const le = Number(stage && stage.line_end);
  // A precise anchor requires BOTH bounds > 0 (1-indexed range). A row with
  // line_start 0 but line_end 42 is nonsensical and must not be 'precise'.
  if (ls > 0 && le > 0) return 'precise';
  const note = String((stage && stage.route_quality_note) || '').toLowerCase();
  if (note.includes('ambig')) return 'ambiguous';
  if (note.includes('not found') || note.includes('missing') || note.includes('no anchor')) return 'missing';
  return 'unresolved';
}

/**
 * Plain-language explanation for an anchor status. Used in the dossier so a
 * missing/ambiguous anchor is explained in words, not hidden in a badge, and a
 * precise anchor is shown with its snippet.
 *
 * @returns {string|null} null when a snippet should be shown instead (precise)
 */
function anchorExplanation(stage) {
  const status = anchorStatus(stage);
  switch (status) {
    case 'precise':
      return null; // a snippet is shown instead
    case 'ambiguous':
      return 'Ambiguous anchor: the source location could not be pinned to a single line, so no precise line range is shown. The stage is still source-visible at the path above.';
    case 'missing':
      return 'Anchor not found: the referenced source location could not be resolved. The stage is kept visible so the gap is honest, not hidden.';
    case 'missing-file':
      return 'Missing source file: the referenced path does not exist in the target. The stage is kept visible so the gap is honest, not hidden.';
    default:
      return 'Unresolved anchor: no precise source location is available. The stage is kept visible; treat its source path as a pointer, not a verified location.';
  }
}

// ---------------------------------------------------------------------------
// Coverage regions
// ---------------------------------------------------------------------------

/**
 * Bucket the coverage matrix into reading regions. Derives central/peripheral
 * from whether a subject carries any route coverage (central) or not
 * (peripheral). Returns counts + representative subjects for each region so the
 * coverage surface shows scale, not a flat subject table.
 */
function coverageRegions(cm) {
  const covered = [];     // route_status complete
  const partial = [];     // route_status partial
  const routeless = [];   // no meaningful route (route_status missing/not_assessed/blocked)
  const missing = [];     // promotion_state missing / not_assessed (CROSS-CUTTING lens)
  // The primary route buckets (covered/partial/routeless) are mutually exclusive
  // and exhaustive: every subject lands in EXACTLY one, so their counts sum to
  // total. `missing` is a SEPARATE promotion lens — a subject can be `missing`
  // (promotion) AND e.g. `routeless` (route_status); it is reported as its own
  // axis, never added into the primary partition, so the counts never imply
  // missing+covered+... = total.
  for (const c of cm) {
    const rs = c.route_status || 'not_assessed';
    if (c.promotion_state === 'missing' || c.promotion_state === 'not_assessed') missing.push(c);
    if (rs === 'complete') covered.push(c);
    else if (rs === 'partial') partial.push(c);
    else routeless.push(c);
  }
  // central = has any route ref; peripheral = no route ref at all.
  const central = cm.filter(c => c.route_refs && c.route_refs.length);
  const peripheral = cm.filter(c => !(c.route_refs && c.route_refs.length));
  return {
    covered, partial, routeless, missing, central, peripheral,
    counts: {
      total: cm.length,
      covered: covered.length,
      partial: partial.length,
      routeless: routeless.length,
      missing: missing.length,
      central: central.length,
      peripheral: peripheral.length,
    },
  };
}

// ---------------------------------------------------------------------------
// Top probes + findings + handoff
// ---------------------------------------------------------------------------

/**
 * Pick the top N probes for the first screen. Priority: blocked before
 * not_assessed (blocked is the stronger "we tried and could not"), then by
 * probe_risk (medium/high first — these are the ones an admiral cares about),
 * preserving stable order otherwise.
 */
function topProbes(probes, n) {
  const riskRank = { high: 0, medium: 1, low: 2 };
  const stateRank = { blocked: 0, failed: 1, cannot_verify: 2, not_assessed: 3, unknown: 4 };
  // NOTE: rank 0 is a real priority ('blocked', 'high'); use nullish checks,
  // never `|| 9`, which would coerce 0 to 9 and invert the priority.
  const r = (map, v) => (v in map ? map[v] : 9);
  return [...(probes || [])]
    .sort((a, b) => {
      const s = r(stateRank, a.state) - r(stateRank, b.state);
      if (s) return s;
      return r(riskRank, a.probe_risk) - r(riskRank, b.probe_risk);
    })
    .slice(0, n || 3);
}

/**
 * Pick the top N findings for the first screen. Priority: severity (critical ->
 * major -> minor -> info), preserving stable order.
 */
function topFindings(findings, n) {
  const sevRank = { critical: 0, major: 1, minor: 2, info: 3 };
  const r = (v) => (v in sevRank ? sevRank[v] : 9);
  return [...(findings || [])]
    .sort((a, b) => r(a.severity) - r(b.severity))
    .slice(0, n || 3);
}

/**
 * Build the agent-handoff query list (doc 15 §10). Each entry has a stable id,
 * a label, and the concrete command a follow-up agent would run via the query
 * surface. These are generated from the real artifact set (real route ids,
 * receipt target) so they are runnable, not placeholder text.
 */
function handoffQueries(navAtlas) {
  const ni = (navAtlas && navAtlas.navigationIndex) || [];
  const rv = (navAtlas && navAtlas.receiptValidation) || {};
  const routeIds = [...new Set(ni.map(s => s.route_id))];
  const packageRoute = routeIds.find(r => r.includes('package')) || routeIds[0] || '';
  const target = rv.target_id || '';
  const q = (id, label, command) => ({ id, label, command });
  return [
    q('handoff:list-routes', 'List journeys / routes',
      'node portolan-core/scripts/query-atlas-navigation.mjs --bundle <bundle> list-routes'),
    q('handoff:open-package-route', 'Open the package-distribution route',
      packageRoute
        ? 'node portolan-core/scripts/query-atlas-navigation.mjs --bundle <bundle> route --id ' + packageRoute
        : 'node portolan-core/scripts/query-atlas-navigation.mjs --bundle <bundle> list-routes'),
    q('handoff:list-probes', 'List unknown probes',
      'node portolan-core/scripts/query-atlas-navigation.mjs --bundle <bundle> list-probes'),
    q('handoff:list-findings', 'List findings for the package route',
      packageRoute
        ? 'node portolan-core/scripts/query-atlas-navigation.mjs --bundle <bundle> route --id ' + packageRoute
        : 'node portolan-core/scripts/query-atlas-navigation.mjs --bundle <bundle> list-findings'),
    q('handoff:receipt', 'Show receipt validation',
      'node portolan-core/scripts/query-atlas-navigation.mjs --bundle <bundle> receipt'),
    q('handoff:coverage-gaps', 'Show coverage gaps',
      'node portolan-core/scripts/query-atlas-navigation.mjs --bundle <bundle> coverage'),
  ].map(x => ({ ...x, target }));
}

module.exports = {
  buildJourneys,
  buildRouteDiagram,
  routeThesis,
  stageLabel,
  stageRole: (s) => PATH_ROLE_LABELS[(s && s.path_role)] || (s && s.path_role) || 'Stage',
  anchorStatus,
  anchorExplanation,
  coverageRegions,
  topProbes,
  topFindings,
  handoffQueries,
  EVIDENCE_STATE_LABELS,
  PATH_ROLE_LABELS,
};

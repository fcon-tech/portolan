name: Bug report
description: Report a reproducible Portolan bug with local evidence.
title: "Bug: "
labels: ["bug", "needs-evidence"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command And Target Shape
      description: Include the command, target shape, output path, and Portolan version or commit.
      placeholder: |
        Version or commit:
        Command:
        Target shape:
        Output path:
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: evidence_state
    attributes:
      label: Evidence State
      description: Choose the strongest honest state for this report.
      options:
        - verified
        - failed
        - blocked
        - unknown
        - cannot_verify
        - not_assessed
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste non-sensitive output snippets, artifact paths, or checks. Do not include secrets or private source.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Safety Check
      options:
        - label: I have not included secrets, customer data, private source code, or sensitive vulnerability details.
          required: true

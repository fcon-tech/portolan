name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline:
    name: Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test -count=1 ./...

      - name: Validate schemas
        run: jq empty schema/*.json testdata/oss-adapter-contract/*.json

      - name: Diff whitespace check
        run: git diff --check

      - name: CLI smoke
        run: go run ./cmd/portolan --help
